<!DOCTYPE html>
<html>
<head>
    <title>New Password - MERCX</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-blue-900 min-h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">

    <h2 class="text-2xl font-bold text-center mb-6">Set New Password</h2>

    <form method="POST" class="space-y-4">

        <input type="password" name="password" placeholder="New Password"
               class="w-full border px-4 py-3 rounded-lg focus:ring-2 focus:ring-green-500 outline-none"
               required>

        <button type="submit"
                class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700">
            Update Password
        </button>
    </form>

</div>
</body>
  </html>
