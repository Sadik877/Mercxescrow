<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - MERCX</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-blue-900 min-h-screen flex items-center justify-center px-4">

<div class="bg-white w-full max-w-md p-8 rounded-2xl shadow-2xl">

    <!-- LOGO -->
    <div class="flex justify-center mb-6">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="MERCX Logo" class="h-16">
    </div>

    <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">
        Login to Your Account
    </h2>

    <!-- FLASH MESSAGES -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="mb-4 p-3 rounded text-sm text-center
                    {% if category == 'error' %}
                        bg-red-100 text-red-700
                    {% else %}
                        bg-green-100 text-green-700
                    {% endif %}
                ">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" class="space-y-4">

        <input type="text" name="username" placeholder="Username"
               class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-green-500 outline-none"
               required>

        <!-- PASSWORD FIELD -->
        <div class="relative">
            <input type="password" name="password" id="password"
                   placeholder="Password"
                   class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-green-500 outline-none"
                   required>

            <span onclick="togglePassword()"
                  class="absolute right-4 top-3 cursor-pointer text-gray-500 text-sm select-none">
                Show
            </span>
        </div>

        <!-- REMEMBER + FORGOT -->
        <div class="flex justify-between items-center text-sm">

            <label class="flex items-center">
                <input type="checkbox" name="remember" class="mr-2">
                Remember me
            </label>

            <a href="/forgot" class="text-green-600 hover:underline">
                Forgot password?
            </a>
        </div>

        <button type="submit"
                id="loginBtn"
                class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition">
            Login
        </button>

    </form>

    <p class="text-center text-sm mt-6">
        Don't have an account?
        <a href="/register" class="text-green-600 font-semibold hover:underline">
            Register
        </a>
    </p>

</div>

<script>
function togglePassword() {
    var pass = document.getElementById("password");
    var btnText = event.target;

    if (pass.type === "password") {
        pass.type = "text";
        btnText.innerText = "Hide";
    } else {
        pass.type = "password";
        btnText.innerText = "Show";
    }
}

// Loading state
document.querySelector("form").addEventListener("submit", function() {
    const btn = document.getElementById("loginBtn");
    btn.innerText = "Logging in...";
    btn.disabled = true;
});
</script>

</body>
            </html>
