<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - MERCX</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-950 via-gray-900 to-blue-950 min-h-screen flex items-center justify-center px-4">

<div class="backdrop-blur-xl bg-white/10 border border-white/20 w-full max-w-md p-8 rounded-3xl shadow-2xl text-white">

    <!-- LOGO -->
    <div class="flex justify-center mb-6">
        <img src="{{ url_for('static', filename='logo.png') }}" 
             alt="MERCX Logo" 
             class="h-16 drop-shadow-lg">
    </div>

    <h2 class="text-3xl font-bold text-center mb-2">
        Welcome Back
    </h2>

    <p class="text-center text-gray-300 text-sm mb-6">
        Secure Escrow Login
    </p>

    <!-- FLASH MESSAGES -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="mb-4 p-3 rounded-lg text-sm text-center font-medium
                    {% if category == 'error' %}
                        bg-red-500/20 text-red-300 border border-red-400/40
                    {% else %}
                        bg-green-500/20 text-green-300 border border-green-400/40
                    {% endif %}
                ">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" class="space-y-5">

        <!-- USERNAME -->
        <div>
            <label class="text-sm text-gray-300">Username</label>
            <input type="text" name="username" placeholder="Enter username"
                class="mt-1 w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-500 transition"
                required>
        </div>

        <!-- PASSWORD -->
        <div>
            <label class="text-sm text-gray-300">Password</label>
            <div class="relative mt-1">
                <input type="password" name="password" id="password"
                    placeholder="Enter password"
                    class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-500 transition"
                    required>

                <button type="button"
                    onclick="togglePassword(this)"
                    class="absolute right-4 top-3 text-sm text-gray-300 hover:text-white transition">
                    Show
                </button>
            </div>
        </div>

        <!-- REMEMBER + FORGOT -->
        <div class="flex justify-between items-center text-sm text-gray-300">

            <label class="flex items-center cursor-pointer">
                <input type="checkbox" name="remember" class="mr-2 accent-green-500">
                Remember me
            </label>

            <a href="/forgot" class="hover:text-green-400 transition">
                Forgot password?
            </a>
        </div>

        <!-- BUTTON -->
        <button type="submit"
            id="loginBtn"
            class="w-full bg-gradient-to-r from-green-500 to-emerald-600 py-3 rounded-xl font-semibold shadow-lg hover:scale-[1.02] hover:shadow-green-500/40 transition-all duration-200">
            Login
        </button>

    </form>

    <p class="text-center text-sm mt-8 text-gray-300">
        Don't have an account?
        <a href="/register" class="text-green-400 font-semibold hover:underline">
            Register
        </a>
    </p>

</div>

<script>
function togglePassword(btn) {
    const pass = document.getElementById("password");

    if (pass.type === "password") {
        pass.type = "text";
        btn.innerText = "Hide";
    } else {
        pass.type = "password";
        btn.innerText = "Show";
    }
}

// Loading state
document.querySelector("form").addEventListener("submit", function() {
    const btn = document.getElementById("loginBtn");
    btn.innerText = "Logging in...";
    btn.disabled = true;
    btn.classList.add("opacity-70");
});
</script>

</body>
            </html>
