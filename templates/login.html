<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - MERCX</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-blue-900 min-h-screen flex items-center justify-center px-4">

<div class="bg-white w-full max-w-md p-8 rounded-2xl shadow-2xl">

    <!-- LOGO -->
    <div class="flex justify-center mb-6">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="MERCX Logo" class="h-16">
    </div>

    <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">Login to Your Account</h2>

    {% if error %}
        <div class="bg-red-100 text-red-700 p-3 rounded mb-4 text-sm text-center">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST" class="space-y-4">

        <input type="text" name="username" placeholder="Username"
               class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-green-500 outline-none"
               required>

        <!-- PASSWORD FIELD -->
        <div class="relative">
            <input type="password" name="password" id="password"
                   placeholder="Password"
                   class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-green-500 outline-none"
                   required>
            <span onclick="togglePassword()"
                  class="absolute right-4 top-3 cursor-pointer text-gray-500 text-sm">
                  Show
            </span>
        </div>

        <!-- REMEMBER -->
        <div class="flex justify-between items-center text-sm">
            <label class="flex items-center">
                <input type="checkbox" class="mr-2">
                Remember me
            </label>

            <a href="#" class="text-green-600 hover:underline">
                Forgot password?
            </a>
        </div>

        <button type="submit"
                class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition">
            Login
        </button>
    </form>

    <p class="text-center text-sm mt-6">
        Don't have an account?
        <a href="/register" class="text-green-600 font-semibold hover:underline">
            Register
        </a>
    </p>

</div>

<script>
function togglePassword() {
    var pass = document.getElementById("password");
    if (pass.type === "password") {
        pass.type = "text";
    } else {
        pass.type = "password";
    }
}
</script>

</body>
              </html>
