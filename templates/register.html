<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - MERCX</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-blue-900 min-h-screen flex items-center justify-center px-4">

<div class="bg-white/95 backdrop-blur-lg w-full max-w-md p-8 rounded-2xl shadow-2xl border border-gray-200">

    <!-- LOGO -->
    <div class="flex justify-center mb-4">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="MERCX Logo" class="h-14">
    </div>

    <h2 class="text-2xl font-bold text-center mb-2 text-gray-800">Create Account</h2>
    <p class="text-center text-sm text-gray-500 mb-6">Join MERCX Secure Escrow Platform</p>

    {% if error %}
        <div class="bg-red-100 text-red-700 p-3 rounded-lg mb-4 text-sm text-center">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST" class="space-y-4">

        <!-- Username -->
        <input type="text" name="username" placeholder="Username"
               class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition"
               required>

        <!-- Email -->
        <input type="email" name="email" placeholder="Email Address"
               class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition"
               required>

        <!-- Password -->
        <div class="relative">
            <input type="password" name="password" id="password"
                   placeholder="Password"
                   class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition"
                   required>
            <button type="button"
                    onclick="togglePassword()"
                    class="absolute right-4 top-3 text-gray-500 text-sm hover:text-gray-700">
                Show
            </button>
        </div>

        <!-- Confirm Password -->
        <input type="password" name="confirm_password"
               placeholder="Confirm Password"
               class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition"
               required>

        <!-- Terms -->
        <div class="flex items-center text-sm text-gray-600">
            <input type="checkbox" name="agree" required class="mr-2 accent-green-600">
            I agree to the
            <a href="/terms" class="text-green-600 ml-1 hover:underline">Terms</a>
            &
            <a href="/privacy" class="text-green-600 ml-1 hover:underline">Privacy Policy</a>
        </div>

        <!-- Button -->
        <button type="submit"
                class="w-full bg-green-600 text-white py-3 rounded-xl font-semibold hover:bg-green-700 transition duration-300 shadow-md hover:shadow-lg">
            Create Account
        </button>

    </form>

    <!-- Login Link -->
    <p class="text-center text-sm mt-6 text-gray-600">
        Already have an account?
        <a href="/login" class="text-green-600 font-semibold hover:underline">Login</a>
    </p>

</div>

<script>
function togglePassword() {
    var pass = document.getElementById("password");
    if (pass.type === "password") {
        pass.type = "text";
    } else {
        pass.type = "password";
    }
}
</script>

</body>
</html>
