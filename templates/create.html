<!DOCTYPE html>
<html>
<head>
    <title>Create Transaction</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-2xl shadow w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-center">Create Escrow</h2>

    <form method="POST" class="space-y-4">
        <input type="text" name="seller" placeholder="Seller Username"
               class="w-full border rounded-lg px-4 py-2" required>

        <input type="number" step="0.01" name="amount" placeholder="Amount"
               class="w-full border rounded-lg px-4 py-2" required>

        <button type="submit"
                class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700">
            Create Transaction
        </button>
    </form>

    <a href="/dashboard" class="block text-center mt-4 text-blue-600">Back to Dashboard</a>
</div>

</body>
</html>
